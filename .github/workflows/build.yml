name: Build standalone app

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: BIN_Block_Receiver_mac.zip
            bundle: "dist/BIN Block Receiver.app"
            zip_cmd: zip -r "BIN_Block_Receiver_mac.zip" "BIN Block Receiver.app"

          - os: ubuntu-latest
            artifact: BIN_Block_Receiver_linux.zip
            bundle: "dist/BIN Block Receiver"
            zip_cmd: zip -r "BIN_Block_Receiver_linux.zip" "BIN Block Receiver"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Linux display dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libxkbcommon0 libfontconfig1

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller BINRecorder.spec --noconfirm

      - name: Zip artifact
        working-directory: dist
        run: ${{ matrix.zip_cmd }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}
